; Greift bei PHP-FPM (Standard auf modernen Hostern). Werte gelten fuer alle
; PHP-Skripte im /public-Tree. Aktualisierungs-Intervall: 5 min (user_ini.cache_ttl).

; --- Upload-Limits fuer Tagungsband-PDFs ---
upload_max_filesize = 32M
post_max_size       = 32M

; --- Production-Hardening ---
display_errors         = Off
display_startup_errors = Off
log_errors             = On
; expose_php gehoert in php.ini (PHP_INI_SYSTEM). In .user.ini ist es wirkungslos.
; Stattdessen entfernen wir X-Powered-By per .htaccess (Header unset X-Powered-By).

; --- Session-Hardening ---
; Code in admin/auth.php setzt diese Werte zusaetzlich pro Request — hier
; doppelt als Defense-in-Depth, falls eine andere Stelle session_start()
; ruft, ohne unsere ini_set-Calls.
session.cookie_secure     = 1
session.cookie_httponly   = 1
session.cookie_samesite   = "Lax"
session.use_strict_mode   = 1
session.use_only_cookies  = 1
session.sid_length        = 96
session.sid_bits_per_character = 5
